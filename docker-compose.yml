version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taxcode-postgres
    environment:
      POSTGRES_USER: taxcode
      POSTGRES_PASSWORD: taxcode_local
      POSTGRES_DB: taxcode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxcode -d taxcode"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taxcode-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Mailhog for local email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: taxcode-mailhog
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
